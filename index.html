<!DOCTYPE HTML>
<html>
<head>
<title>ألبوم العائلة</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<link rel="stylesheet" href="assets/css/main.css" />
<link rel="stylesheet" href="assets/css/fontawesome-all.min.css" />
<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
<style>
#upload-btn{position:fixed;bottom:30px;right:30px;z-index:9999;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.4);color:#fff;font-size:1rem;padding:14px 22px;border-radius:50px;cursor:pointer;backdrop-filter:blur(10px);transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-family:inherit}
#upload-btn:hover{background:rgba(255,255,255,0.28);border-color:rgba(255,255,255,0.7);transform:translateY(-2px)}
#upload-modal{display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);align-items:center;justify-content:center}
#upload-modal.active{display:flex}
#upload-box{background:#1a1f2c;border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:36px;width:90%;max-width:440px;text-align:center;color:#fff;position:relative}
#upload-box h3{margin:0 0 8px;font-size:1.4rem}
#upload-box p{margin:0 0 24px;opacity:0.6;font-size:0.9rem}
#drop-zone{border:2px dashed rgba(255,255,255,0.25);border-radius:12px;padding:36px 20px;cursor:pointer;transition:all 0.3s;margin-bottom:20px}
#drop-zone:hover{border-color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.05)}
#file-input{display:none}
#upload-progress{display:none;background:rgba(255,255,255,0.08);border-radius:8px;height:6px;margin-bottom:16px;overflow:hidden}
#progress-bar{height:100%;background:linear-gradient(90deg,#4fc3f7,#81d4fa);border-radius:8px;width:0%;transition:width 0.3s ease}
#upload-status{font-size:0.85rem;opacity:0.7;margin-bottom:20px;min-height:20px}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:1.4rem;cursor:pointer;line-height:1;transition:color 0.2s}
.modal-close:hover{color:#fff}
#gallery-loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;color:rgba(255,255,255,0.4);font-size:0.9rem;pointer-events:none}
#gallery-loading.hidden{display:none}
#empty-state{display:none;position:fixed;inset:0;align-items:center;justify-content:center;flex-direction:column;color:rgba(255,255,255,0.35);text-align:center;gap:12px}
#empty-state.active{display:flex}
#empty-state i{font-size:3rem;opacity:0.3}
#empty-state p{margin:0;font-size:1rem}
</style>
</head>
<body class="is-preload">
<div id="wrapper">
<section id="main">
<div id="gallery-loading">جاري تحميل الصور...</div>
<div id="empty-state">
<i class="fas fa-images"></i>
<p>لا توجد صور بعد — ارفع أول صورة!</p>
</div>
<div class="items" id="gallery-container">
<div class="item intro span-2">
<h1>ألبوم العائلة</h1>
<p>ذكرياتنا الجميلة</p>
</div>
</div>
</section>
<section id="footer">
<section><p>ألبوم صور العائلة</p></section>
<section><ul class="copyright"><li>&copy; ألبوم العائلة 2024</li></ul></section>
</section>
</div>
<button id="upload-btn">+ رفع صورة</button>
<div id="upload-modal">
<div id="upload-box">
<button class="modal-close" onclick="closeModal()">&times;</button>
<h3>رفع صورة جديدة</h3>
<p>اختر صورة من هاتفك</p>
<div id="drop-zone" onclick="document.getElementById('file-input').click()">
<p style="font-size:2rem;opacity:0.4">📷</p>
<span style="opacity:0.5;font-size:0.9rem">اضغط هنا لاختيار صورة</span>
</div>
<input type="file" id="file-input" accept="image/*" multiple />
<div id="upload-progress"><div id="progress-bar"></div></div>
<div id="upload-status"></div>
</div>
</div>
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/jquery.poptrox.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>
<script>
const CLOUD_NAME='dzlclwscb';
const UPLOAD_PRESET='family_upload';
const FOLDER='family-album';
async function loadGallery(){
const loading=document.getElementById('gallery-loading');
const emptyState=document.getElementById('empty-state');
const container=document.getElementById('gallery-container');
loading.classList.remove('hidden');
try{
const res=await fetch('https://res.cloudinary.com/'+CLOUD_NAME+'/image/list/'+FOLDER+'.json');
if(!res.ok)throw new Error('error');
const data=await res.json();
const resources=data.resources||[];
loading.classList.add('hidden');
if(resources.length===0){emptyState.classList.add('active');return;}
emptyState.classList.remove('active');
renderGallery(resources);
}catch(err){
loading.classList.add('hidden');
emptyState.classList.add('active');
}}
const spans=['span-1','span-2','span-3','span-1','span-2','span-1','span-2','span-3'];
function renderGallery(resources){
const container=document.getElementById('gallery-container');
container.querySelectorAll('.item.thumb').forEach(el=>el.remove());
resources.forEach((img,index)=>{
const pid=img.public_id;
const span=spans[index%spans.length];
const thumb='https://res.cloudinary.com/'+CLOUD_NAME+'/image/upload/c_fill,w_400,h_300,q_auto,f_auto/'+pid;
const full='https://res.cloudinary.com/'+CLOUD_NAME+'/image/upload/q_auto,f_auto/'+pid;
const name=pid.split('/').pop().replace(/[-_]/g,' ');
const article=document.createElement('article');
article.className='item thumb '+span;
article.innerHTML='<h2>'+name+'</h2><a href="'+full+'" class="image"><img src="'+thumb+'" alt="'+name+'" loading="lazy"></a>';
container.appendChild(article);
});
$('#main').poptrox({
onPopupOpen:function(){$('body').addClass('is-poptrox-visible');},
onPopupClose:function(){$('body').removeClass('is-poptrox-visible');},
overlayColor:'#1a1f2c',overlayOpacity:0.85,popupCloserText:'',popupLoaderText:'',
selector:'.item.thumb a.image',caption:function($a){return $a.prev('h2').html();},
usePopupDefaultStyling:false,usePopupCloser:false,usePopupCaption:true,usePopupNav:true,windowMargin:50
});
}
async function uploadFiles(files){
const progress=document.getElementById('upload-progress');
const bar=document.getElementById('progress-bar');
const status=document.getElementById('upload-status');
progress.style.display='block';
let uploaded=0;
for(const file of files){
status.textContent='جاري رفع '+file.name+'...';
const formData=new FormData();
formData.append('file',file);
formData.append('upload_preset',UPLOAD_PRESET);
formData.append('folder',FOLDER);
try{
const res=await fetch('https://api.cloudinary.com/v1_1/'+CLOUD_NAME+'/image/upload',{method:'POST',body:formData});
if(!res.ok)throw new Error('error');
uploaded++;
bar.style.width=(uploaded/files.length*100)+'%';
status.textContent='تم رفع '+uploaded+' من '+files.length;
}catch(err){status.textContent='خطأ في الرفع';}
}
if(uploaded===files.length){
status.textContent='✅ تم الرفع! جاري التحديث...';
setTimeout(()=>{closeModal();progress.style.display='none';bar.style.width='0%';loadGallery();},1500);
}}
function openModal(){document.getElementById('upload-modal').classList.add('active');}
function closeModal(){document.getElementById('upload-modal').classList.remove('active');document.getElementById('upload-status').textContent='';document.getElementById('progress-bar').style.width='0%';document.getElementById('upload-progress').style.display='none';}
document.getElementById('upload-btn').addEventListener('click',openModal);
document.getElementById('upload-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('file-input').addEventListener('change',function(){if(this.files.length>0)uploadFiles(Array.from(this.files));});
window.addEventListener('load',loadGallery);
</script>
</body>
</html>
